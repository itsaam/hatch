version: 2

project_name: hatch-cli

before:
  hooks:
    - go mod tidy

builds:
  - id: hatch
    binary: hatch
    main: .
    dir: cli
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{ .Version }} -X main.commit={{ .Commit }} -X main.date={{ .Date }}

archives:
  - id: hatch
    ids:
      - hatch
    name_template: >-
      {{ .ProjectName | replace "-cli" "" }}_{{ .Version }}_
      {{- title .Os }}_{{ .Arch }}
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - src: cli/README.md
        dst: README.md
      - src: LICENSE
        dst: LICENSE

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"

release:
  github:
    owner: itsaam
    name: hatch
  draft: false
  prerelease: auto
  name_template: "v{{ .Version }}"
