services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - hatch_pgdata:/var/lib/postgresql/data
    networks:
      - hatch_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./core/api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      ALLOWED_ORIGIN: ${ALLOWED_ORIGIN}
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET}
      GITHUB_APP_ENABLED: ${GITHUB_APP_ENABLED:-true}
      GITHUB_APP_ID: ${GITHUB_APP_ID}
      GITHUB_APP_PRIVATE_KEY_PATH: /app/secrets/github-app.pem
      HATCH_NETWORK: dokploy-network
      HATCH_DOMAIN: ${HATCH_DOMAIN}
      PREVIEW_TTL_HOURS: ${PREVIEW_TTL_HOURS:-168}
      PREVIEW_REAPER_INTERVAL_MINUTES: ${PREVIEW_REAPER_INTERVAL_MINUTES:-60}
      PORT: "8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /etc/hatch/secrets:/app/secrets:ro
    networks:
      - hatch_internal
      - dokploy-network
    labels:
      - traefik.enable=true
      - traefik.docker.network=dokploy-network
      - traefik.http.routers.hatch-api.rule=Host(`api.${HATCH_DOMAIN}`)
      - traefik.http.routers.hatch-api.entrypoints=websecure
      - traefik.http.routers.hatch-api.tls=true
      - traefik.http.routers.hatch-api.tls.certresolver=letsencrypt
      - traefik.http.services.hatch-api.loadbalancer.server.port=8080

  landing:
    build: ./landing
    restart: unless-stopped
    networks:
      - dokploy-network
    labels:
      - traefik.enable=true
      - traefik.docker.network=dokploy-network
      - traefik.http.routers.hatch-landing.rule=Host(`${HATCH_DOMAIN}`) || Host(`www.${HATCH_DOMAIN}`)
      - traefik.http.routers.hatch-landing.entrypoints=websecure
      - traefik.http.routers.hatch-landing.tls=true
      - traefik.http.routers.hatch-landing.tls.certresolver=letsencrypt
      - traefik.http.services.hatch-landing.loadbalancer.server.port=80

networks:
  hatch_internal:
    name: hatch_internal
    internal: true
  dokploy-network:
    external: true

volumes:
  hatch_pgdata:
