version: 1
services:
  web:
    build: .
    port: 8000
    expose: true
    env:
      REDIS_URL: redis://cache:6379/0
      DJANGO_SECRET_KEY: ${SECRET_DJANGO_SECRET_KEY}
      DJANGO_ALLOWED_HOSTS: "*"
      PORT: "8000"
    depends_on: [cache]
    healthcheck:
      cmd: curl -f http://localhost:8000/health
      interval_seconds: 5
      retries: 12
  cache:
    image: redis:7-alpine
    healthcheck:
      cmd: redis-cli ping
      interval_seconds: 3
      retries: 20
