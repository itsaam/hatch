version: 1
services:
  web:
    build: .
    port: 3000
    expose: true
    env:
      DATABASE_URL: postgres://app:${DB_PASSWORD}@db:5432/app
      REDIS_URL: redis://redis:6379/0
      RAILS_ENV: production
      RAILS_LOG_TO_STDOUT: "1"
      RAILS_SERVE_STATIC_FILES: "1"
      SECRET_KEY_BASE: ${SECRET_RAILS_SECRET_KEY_BASE}
      PORT: "3000"
    depends_on: [db, redis]
    healthcheck:
      cmd: curl -f http://localhost:3000/health
      interval_seconds: 5
      retries: 12
  worker:
    build: .
    dockerfile: Dockerfile
    env:
      DATABASE_URL: postgres://app:${DB_PASSWORD}@db:5432/app
      REDIS_URL: redis://redis:6379/0
      RAILS_ENV: production
      RAILS_LOG_TO_STDOUT: "1"
      SECRET_KEY_BASE: ${SECRET_RAILS_SECRET_KEY_BASE}
      RUN_MODE: worker
    depends_on: [db, redis]
  db:
    image: postgres:16-alpine
    env:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: app
    healthcheck:
      cmd: pg_isready -U app
      interval_seconds: 3
      retries: 20
  redis:
    image: redis:7-alpine
    healthcheck:
      cmd: redis-cli ping
      interval_seconds: 3
      retries: 20
seed:
  after: db
  sql: ./seed/preview.sql
